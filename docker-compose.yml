services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tempmail-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-tempmail-dev-secret}
      IMAP_HOST: ${IMAP_HOST:-imap.qq.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USERNAME: ${IMAP_USERNAME:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      MAILBOX_SYNC_TIMEOUT_MS: ${MAILBOX_SYNC_TIMEOUT_MS:-45000}
      MAILBOX_SYNC_FETCH_WINDOW: ${MAILBOX_SYNC_FETCH_WINDOW:-50}
    volumes:
      - ./backend/data:/app/data
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: tempmail-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
